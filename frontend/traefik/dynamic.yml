# Traefik dynamic config (file provider). Routes by path to containers reached
# by name on the shared `fin-track` docker network — no docker socket needed.
#   /api/*  -> backend container  (named `fin-track`, port 8080)
#   /*      -> frontend container (named `fin-track-ui`, port 80)
http:
  middlewares:
    auth-middleware:
      plugin:
        traefikauth:
          authServiceURL: "http://auth-service:8000"
          bearerSecret: "supersecrettoken"
  routers:
    api:
      rule: 'PathPrefix(`/api`)'
      entryPoints: [web]
      service: backend
      observability:
        accessLogs: true
      priority: 100 # beats the frontend catch-all
      middlewares:
        - auth-middleware
    web:
      rule: 'PathPrefix(`/`)'
      entryPoints: [web]
      service: frontend
      observability:
        accessLogs: true 
      priority: 1
      middlewares:
        - auth-middleware
    auth-service:
      rule: 'Host(`www.959353d1958446d49b91832e0d8e21fa.online`) && PathPrefix(`/login`) || PathPrefix(`/verify`) || PathPrefix(`/success`)'
      entryPoints: [web]
      service: auth-service
  services:
    backend:
      loadBalancer:
        servers:
          - url: 'http://fin-track:8080/api'
    frontend:
      loadBalancer:
        servers:
          - url: 'http://fin-track-ui:80'
    auth-service:
      loadBalancer:
        servers:
          - url: 'http://auth-service:8000'


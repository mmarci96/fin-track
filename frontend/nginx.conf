server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA history fallback: unknown paths return index.html so client-side
    # routes (deep links / refreshes) work. Traefik routes /api to the backend
    # before traffic ever reaches this container.
    location / {
        try_files $uri $uri/ /index.html;
    }
}

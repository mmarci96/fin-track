<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0;
               display: grid; place-items: center; height: 100vh; margin: 0; }
        form { background: #1e293b; padding: 2rem; border-radius: 12px; width: 280px;
               box-shadow: 0 10px 30px rgba(0,0,0,.4); }
        h1 { font-size: 1.1rem; margin: 0 0 1rem; }
        input { width: 100%; box-sizing: border-box; padding: .6rem; margin: .35rem 0;
                border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; }
        button { width: 100%; padding: .6rem; margin-top: .75rem; border: 0; border-radius: 6px;
                 background: #6366f1; color: white; font-weight: 600; cursor: pointer; }
        .error { color: #f87171; font-size: .85rem; margin: 0 0 .5rem; }
    </style>
</head>
<body>
    <form action="/login" method="post">
        <h1>fin-track sign in</h1>
        {{if .Error}}<p class="error">{{.Error}}</p>{{end}}
        <input name="email" type="email" placeholder="Email" autocomplete="username" autofocus>
        <input name="password" type="password" placeholder="Password" autocomplete="current-password">
        <input type="hidden" name="next" value="{{.Next}}">
        <button type="submit">Sign in</button>
    </form>
</body>
</html>
